<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
#bar {
  background: #1e293b;
  border-bottom: 1px solid #334155;
  padding: 5px 8px;
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: nowrap;
  height: 40px;
  overflow: hidden;
}
.lbl { color: #64748b; font-size: 10px; flex-shrink: 0; }
.sep { width: 1px; height: 18px; background: #475569; margin: 0 3px; flex-shrink: 0; }
.btn {
  padding: 3px 8px;
  border: 1px solid #475569;
  border-radius: 5px;
  background: #334155;
  color: #cbd5e1;
  cursor: pointer;
  font-size: 11px;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn.on { background: #4f46e5; border-color: #818cf8; color: #fff; }
.btn.r  { background: #334155; }
.btn.r.on { background: #dc2626; border-color: #f87171; color: #fff; }
.btn.b  { background: #334155; }
.btn.b.on { background: #2563eb; border-color: #60a5fa; color: #fff; }
#wrap { position: relative; line-height: 0; }
canvas { display: block; cursor: crosshair; }
#msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
       color: #64748b; font-size: 12px; pointer-events: none; }
</style>
</head>
<body>
<div id="bar">
  <span class="lbl">도구</span>
  <button id="t-pencil" class="btn on" onclick="setTool('pencil')">✏️ 펜슬</button>
  <button id="t-line"   class="btn"    onclick="setTool('line')">📏 직선</button>
  <button id="t-eraser" class="btn"    onclick="setTool('eraser')">🧹 지우개</button>
  <div class="sep"></div>
  <button id="c-red"  class="btn r on" onclick="setColor('red')">🔴 탭</button>
  <button id="c-blue" class="btn b"    onclick="setColor('blue')">🔵 극판</button>
  <div class="sep"></div>
  <button class="btn" onclick="undo()" title="Ctrl+Z">↩️ 되돌리기</button>
  <button class="btn" onclick="clearAll()">🗑️ 초기화</button>
</div>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="msg">이미지 로딩 중...</div>
</div>

<script>
// ── 변수 ────────────────────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var msgEl  = document.getElementById('msg');
var W = 900, H = 200;
var tool = 'pencil', strokeColor = '#ff3333';
var strokes   = [];   // [{type:'path'|'line', color, pts:[[x,y],...]}]
var bgImage   = new Image();
var bgLoaded  = false;

// 현재 드로잉 상태
var isDown  = false;
var curPts  = [];
var lineStart = null;

// initialized flag
var initialized = false, lastBgUrl = '';

// ── Streamlit 프로토콜 ──────────────────────────────────────────
window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'streamlit:render') {
    var a = d.args || {};
    var bgUrl = (a.bgUrl || '').toString();
    var w = parseInt(a.width)  || 900;
    var h = parseInt(a.height) || 200;
    if (!initialized || bgUrl !== lastBgUrl || w !== W || h !== H) {
      setupSize(w, h);
      loadBg(bgUrl);
      initialized = true;
      lastBgUrl = bgUrl;
    }
  }
});

// Streamlit 에 준비됨 알림
function stPost(obj) {
  obj.isStreamlitMessage = true;
  window.parent.postMessage(obj, '*');
}
stPost({ type: 'streamlit:componentReady', apiVersion: 1 });

function setFrameHeight(h) {
  stPost({ type: 'streamlit:setFrameHeight', height: h });
}
function sendValue(val) {
  stPost({ type: 'streamlit:setComponentValue', value: val, dataType: 'json' });
}

// 초기 높이
setFrameHeight(260);

// ── 크기 / 배경 ──────────────────────────────────────────────────
function setupSize(w, h) {
  W = w; H = h;
  canvas.width  = w;
  canvas.height = h;
  strokes = [];
  setFrameHeight(h + 42);
}

function loadBg(url) {
  if (!url) { bgLoaded = false; redraw(); return; }
  bgLoaded = false;
  msgEl.textContent = '이미지 로딩 중...';
  msgEl.style.display = 'block';
  var img = new Image();
  img.onload = function() {
    bgImage  = img;
    bgLoaded = true;
    msgEl.style.display = 'none';
    redraw();
  };
  img.onerror = function() {
    msgEl.textContent = '이미지 로드 실패';
  };
  img.src = url;
}

// ── 렌더링 ──────────────────────────────────────────────────────
function redraw() {
  ctx.clearRect(0, 0, W, H);
  if (bgLoaded) {
    ctx.drawImage(bgImage, 0, 0, W, H);
  } else {
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, W, H);
  }
  strokes.forEach(drawStroke);
}

function drawStroke(s, preview) {
  if (!s || !s.pts || s.pts.length < 1) return;
  ctx.save();
  ctx.strokeStyle = s.color || '#ff3333';
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(s.pts[0][0], s.pts[0][1]);
  for (var i = 1; i < s.pts.length; i++) {
    ctx.lineTo(s.pts[i][0], s.pts[i][1]);
  }
  ctx.stroke();
  ctx.restore();
}

// ── 마우스 이벤트 ────────────────────────────────────────────────
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width  / rect.width;
  var scaleY = canvas.height / rect.height;
  return [
    (e.clientX - rect.left) * scaleX,
    (e.clientY - rect.top)  * scaleY
  ];
}

canvas.addEventListener('mousedown', function(e) {
  var p = getPos(e);
  isDown = true;
  if (tool === 'pencil') {
    curPts = [p];
  } else if (tool === 'line') {
    lineStart = p;
    curPts = [p, p];
  } else if (tool === 'eraser') {
    eraseNear(p);
    isDown = false;
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (!isDown) return;
  var p = getPos(e);
  if (tool === 'pencil') {
    curPts.push(p);
    redraw();
    drawStroke({ color: strokeColor, pts: curPts });
  } else if (tool === 'line' && lineStart) {
    curPts = [lineStart, p];
    redraw();
    drawStroke({ color: strokeColor, pts: curPts });
  }
});

canvas.addEventListener('mouseup', function(e) {
  if (!isDown) return;
  isDown = false;
  var p = getPos(e);
  if (tool === 'pencil' && curPts.length >= 2) {
    strokes.push({ type: 'path', color: strokeColor, pts: curPts.slice() });
    sendData();
  } else if (tool === 'line' && lineStart) {
    strokes.push({ type: 'line', color: strokeColor, pts: [lineStart, p] });
    lineStart = null;
    sendData();
  }
  curPts = [];
  redraw();
});

canvas.addEventListener('mouseleave', function() {
  if (isDown && tool === 'pencil' && curPts.length >= 2) {
    strokes.push({ type: 'path', color: strokeColor, pts: curPts.slice() });
    sendData();
  }
  isDown = false; curPts = []; lineStart = null;
  redraw();
});

// ── 터치 지원 ────────────────────────────────────────────────────
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  canvas.dispatchEvent(new MouseEvent('mousedown',
    { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }));
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  canvas.dispatchEvent(new MouseEvent('mousemove',
    { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }));
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  canvas.dispatchEvent(new MouseEvent('mouseup', {}));
}, { passive: false });

// ── 지우개 ──────────────────────────────────────────────────────
function ptSegDist(p, a, b) {
  var dx = b[0]-a[0], dy = b[1]-a[1];
  var len2 = dx*dx + dy*dy;
  if (len2 === 0) return Math.hypot(p[0]-a[0], p[1]-a[1]);
  var t = Math.max(0, Math.min(1, ((p[0]-a[0])*dx + (p[1]-a[1])*dy) / len2));
  return Math.hypot(p[0]-a[0]-t*dx, p[1]-a[1]-t*dy);
}

function strokeDist(s, p) {
  var mn = Infinity;
  for (var i = 0; i < s.pts.length-1; i++) {
    var d = ptSegDist(p, s.pts[i], s.pts[i+1]);
    if (d < mn) mn = d;
  }
  return mn;
}

function eraseNear(p) {
  var thr = 12, bestIdx = -1, bestDist = thr;
  strokes.forEach(function(s, i) {
    var d = strokeDist(s, p);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  });
  if (bestIdx >= 0) {
    strokes.splice(bestIdx, 1);
    redraw();
    sendData();
  }
}

// ── 도구 / 색상 ──────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  canvas.style.cursor = (t === 'eraser') ? 'cell' : 'crosshair';
  ['pencil','line','eraser'].forEach(function(x) {
    document.getElementById('t-'+x).className =
      'btn' + (x === t ? ' on' : '');
  });
}

function setColor(c) {
  strokeColor = (c === 'red') ? '#ff3333' : '#3388ff';
  document.getElementById('c-red').className  = 'btn r' + (c === 'red'  ? ' on' : '');
  document.getElementById('c-blue').className = 'btn b' + (c === 'blue' ? ' on' : '');
}

function undo() {
  if (strokes.length === 0) return;
  strokes.pop();
  redraw();
  sendData();
}

function clearAll() {
  strokes = [];
  redraw();
  sendData();
}

// ── 데이터 전송 ──────────────────────────────────────────────────
function sendData() {
  var lines = strokes.map(function(s) {
    return { type: s.type, stroke: s.color, points: s.pts };
  });
  sendValue({ lines: lines, width: W, height: H });
}

// ── 키보드 단축키 ────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();
  }
});
</script>
</body>
</html>
